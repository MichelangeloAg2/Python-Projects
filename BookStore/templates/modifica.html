<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modifica Libro</title>
</head>
<body>

<h1>Modifica Libro</h1>
    <form action="/modifica/{{ libro[0] }}" method="post" >
      <label for="titolo">Titolo: </label>
      <input type="text" name="titolo" id="titolo" value="{{ libro[1] }}"><br>
      <label for="autore">Autore:</label>
      <input type="text" name="autore" id="autore" value="{{ libro[2] }}"><br>
      <label for="genere">Genere:</label>
      <input type="text" name="genere" id="genere" value="{{ libro[3] }}"><br>
      <label for="descrizione">Descrizione: </label>
      <textarea name="descrizione" id="descrizione" cols="30" rows="5">{{ libro[4] }}</textarea><br>
      <button type="submit">Salva modifiche</button>

    </form>

</body>
</html>
