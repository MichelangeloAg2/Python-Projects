<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Libro</title>
</head>
<body>

    <h1>Aggiungi Libro</h1>

        <form action="/aggiungi" method="post">
          <label for="titolo">Titolo:</label>
          <input type="text" name="titolo" id="titolo"><br>
          <label for="autore">Autore;</label>
          <input type="text", name="autore" id="autore"><br>
          <label for="genere">Genere:</label>
          <input type="text" name="genere" id="genere"><br>
          <label for="descrizione">Descrizione:</label>
          <textarea name="descrizione" id="descrizione" cols="30" rows="5"></textarea><br>
          <button type="submit">Aggiungi</button>
        </form>

</body>
</html>
